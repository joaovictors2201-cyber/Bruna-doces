<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cardápio — Bruna Valadares Confeitaria</title>
  <meta name="description" content="Cardápio digital da Bruna Valadares Confeitaria. Doces artesanais feitos com amor.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <img src="assets/logo-azul.png" alt="Bruna Valadares Confeitaria" class="header__logo">
    <p class="header__slogan">Feito com carinho, entregue com amor</p>
  </header>

  <nav class="category-nav" id="categoryNav" aria-label="Categorias">
    <div class="category-nav__inner" id="categoryNavInner">
      <!-- preenchido pelo script.js -->
    </div>
  </nav>

  <main class="main" id="main">
    <div class="loading" id="loading">
      <div class="loading__spinner"></div>
      <p>Carregando cardápio...</p>
    </div>

    <div class="error" id="error" hidden>
      <div class="error__icon">🍰</div>
      <p id="errorMsg"></p>
    </div>

    <div id="menu"></div>
  </main>

  <footer class="footer">
    <img src="assets/logo-creme.png" alt="Bruna Valadares Confeitaria" class="footer__logo">
    <div class="footer__contato">

    </div>
    <p class="footer__copy">© <span id="footerAno"></span> Bruna Valadares Confeitaria</p>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" aria-modal="true" role="dialog" hidden>
    <button class="lightbox__close" id="lightboxClose" aria-label="Fechar">✕</button>
    <div class="lightbox__inner">
      <img class="lightbox__img" id="lightboxImg" src="" alt="">
      <div class="lightbox__info">
        <div class="lightbox__gradient"></div>
        <div class="lightbox__text">
          <h3 class="lightbox__name" id="lightboxName"></h3>
          <p class="lightbox__desc" id="lightboxDesc"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
